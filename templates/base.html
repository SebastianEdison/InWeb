<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🏪 Mi Negocio</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/"><i class="fas fa-box"></i> Inventario</a></li>
                <li><a href="/agregar"><i class="fas fa-plus-circle"></i> Agregar Producto</a></li>
                <li><a href="/ventas"><i class="fas fa-shopping-cart"></i> Ventas</a></li>
                <li><a href="/reportes"><i class="fas fa-chart-line"></i> Reportes</a></li>
            </ul>
            <div class="sidebar-footer">
                <p>Sesión: Administrador</p>
            </div>
        </nav>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
